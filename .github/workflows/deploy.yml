# Workflow de déploiement automatique sur GitHub Pages.
#
# Déclenché à chaque push sur la branche main.
# Build le projet Vue 3 / Vite, copie index.html en 404.html (fallback SPA
# pour que Vue Router en mode history fonctionne), puis déploie via l'action
# officielle GitHub Pages.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permet de lancer le workflow manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois (annule les précédents en attente)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Astuce SPA : GitHub Pages renvoie 404.html quand une route n'existe pas
      # en tant que fichier statique. En copiant index.html → 404.html, Vue Router
      # reprend la main et affiche la bonne page.
      - name: Copy index.html to 404.html (SPA fallback)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
